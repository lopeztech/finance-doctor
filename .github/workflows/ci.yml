name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create SCSS symlinks
        run: |
          for dir in src/styles/default src/styles/apple src/styles/facebook src/styles/google src/styles/material src/styles/transparent; do
            ln -s "$PWD/node_modules" "$dir/node_modules" 2>/dev/null || true
          done

      - run: npm run build

      - run: npm test -- --coverage --passWithNoTests

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
