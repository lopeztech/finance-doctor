name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: finance-doctor-lcd

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Fetch Firebase Web App config from Secret Manager
        id: firebase-config
        run: |
          fetch_secret() {
            gcloud secrets versions access latest --secret="$1" --project="${{ env.PROJECT_ID }}" 2>/dev/null || echo ""
          }
          {
            echo "api_key=$(fetch_secret firebase-web-api-key)"
            echo "auth_domain=$(fetch_secret firebase-web-auth-domain)"
            echo "project_id=$(fetch_secret firebase-web-project-id)"
            echo "app_id=$(fetch_secret firebase-web-app-id)"
          } >> "$GITHUB_OUTPUT"

      - name: Install app dependencies
        run: npm ci

      - name: Create SCSS symlinks
        run: |
          for dir in src/styles/default src/styles/apple src/styles/facebook src/styles/google src/styles/material src/styles/transparent; do
            ln -s "$PWD/node_modules" "$dir/node_modules" 2>/dev/null || true
          done

      - name: Build static export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ steps.firebase-config.outputs.api_key }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase-config.outputs.auth_domain }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ steps.firebase-config.outputs.project_id }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ steps.firebase-config.outputs.app_id }}
        run: |
          npm run build
          test -d out || { echo "::error::out/ directory was not produced"; exit 1; }

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Deploy Hosting + Functions
        run: |
          npx -y firebase-tools@14 deploy \
            --only hosting,functions \
            --project ${{ env.PROJECT_ID }} \
            --non-interactive \
            --force
