name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: finance-doctor-lcd
  REGION: australia-southeast1
  SERVICE: finance-doctor
  IMAGE: australia-southeast1-docker.pkg.dev/finance-doctor-lcd/finance-doctor-images/finance-doctor

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Fetch Firebase Web App config from Secret Manager
        id: firebase-config
        run: |
          fetch_secret() {
            gcloud secrets versions access latest --secret="$1" --project="${{ env.PROJECT_ID }}" 2>/dev/null || echo ""
          }
          {
            echo "api_key=$(fetch_secret firebase-web-api-key)"
            echo "auth_domain=$(fetch_secret firebase-web-auth-domain)"
            echo "project_id=$(fetch_secret firebase-web-project-id)"
            echo "app_id=$(fetch_secret firebase-web-app-id)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ steps.firebase-config.outputs.api_key }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ steps.firebase-config.outputs.auth_domain }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ steps.firebase-config.outputs.project_id }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ steps.firebase-config.outputs.app_id }}" \
            -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Deploy Cloud Functions
        run: |
          npx -y firebase-tools@14 deploy \
            --only functions \
            --project ${{ env.PROJECT_ID }} \
            --non-interactive \
            --force
